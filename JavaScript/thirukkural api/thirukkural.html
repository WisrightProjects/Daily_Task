<!DOCTYPE html>
<html>

<head>
    <title>📖 Thirukkural Finder</title>

  <!-- Thiruvalluvar Icon -->
  <link 
    rel="icon" 
    type="image/png" 
    href="https://upload.wikimedia.org/wikipedia/commons/7/75/Thiruvalluvar_Statue_at_Kanyakumari.png"
  >


  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      
    }
body{
  font-family:Arial, sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  color:white;
  padding:20px;

  background-image:
    linear-gradient(rgba(15,23,42,0.7), rgba(15,23,42,0.8)),
    url("./img/ol.jpeg");

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  background-attachment:fixed;
}

    @keyframes bgMove{
      0%{
        background-position:0% 50%;
      }
      50%{
        background-position:100% 50%;
      }
      100%{
        background-position:0% 50%;
      }
    }

    .container{
      width:90%;
      max-width:800px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:25px;
      padding:40px;
      text-align:center;
      box-shadow:0 10px 40px rgba(0,0,0,0.4);
      animation:fadeIn 1s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(30px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    h1{
      font-size:45px;
      margin-bottom:30px;
      background:linear-gradient(to right,#f8fafc,#e88625);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      letter-spacing:1px;
      font-weight: bold;
      font-style:italic;
      font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
      text-decoration: underline;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .search-box{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:15px;
      flex-wrap:wrap;
    }

    input{
      padding:15px 20px;
      width:280px;
      border:none;
      border-radius:14px;
      font-size:18px;
      outline:none;
      background:rgba(255,255,255,0.12);
      color:white;
      transition:0.3s;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    input::placeholder{
      color:#cbd5e1;
    }

    input:focus{
      transform:scale(1.04);
      box-shadow:0 0 20px rgb(234, 104, 57);
      background:rgba(255,255,255,0.18);
    }

    button{
      padding:15px 28px;
      border:none;
      border-radius:14px;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      color:white;
      background:linear-gradient(135deg,#d46606,#f66a3b);
      transition:0.3s;
      box-shadow:0 5px 10px orangered;
    }

    button:hover{
      transform:translateY(-4px) scale(1.05);
      box-shadow:0 10px 30px rgb(234, 104, 57);
    }

    button:active{
      transform:scale(0.95);
    }

    #tamil{
      margin-top:40px;
      font-size:34px;
      line-height:1.9;
      color:#f8fafc;
      animation:showText 0.5s ease;
    }

    #english{
      margin-top:25px;
      font-size:22px;
      color:#dbeafe;
      line-height:1.8;
      animation:showText 0.8s ease;
    }

    @keyframes showText{
      from{
        opacity:0;
        transform:translateY(15px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media(max-width:600px){

      h1{
        font-size:32px;
      }

      input{
        width:100%;
      }

      button{
        width:100%;
      }

      #tamil{
        font-size:26px;
      }

      #english{
        font-size:18px;
      }

    }
    /* ================= MOBILE ================= */

@media(max-width:768px){

  body{
    padding:15px;
    overflow:auto;
  }

  .container{
    width:100%;
    padding:25px 20px;
    border-radius:20px;
  }

  h1{
    font-size:28px;
    flex-direction:column;
    gap:5px;
    line-height:1.4;
  }

  h1 img{
    width:55px !important;
    height:55px !important;
    margin:auto;
  }

  .search-box{
    flex-direction:column;
    gap:15px;
  }

  input{
    width:100%;
    font-size:16px;
    padding:14px;
  }

  button{
    width:100%;
    font-size:16px;
    padding:14px;
  }

  #tamil{
    font-size:24px !important;
    line-height:1.7;
    margin-top:30px;
  }

  #english{
    font-size:17px !important;
    line-height:1.7;
    padding:10px;
    border-radius:12px;
  }

}

/* ================= SMALL MOBILE ================= */

@media(max-width:480px){

  h1{
    font-size:22px;
  }

  h1 img{
    width:45px !important;
    height:45px !important;
  }

  .container{
    padding:20px 15px;
  }

  #tamil{
    font-size:20px !important;
  }

  #english{
    font-size:15px !important;
  }

}

  </style>

</head>

<body>

  <div class="container">

   <h1 ><img src="/img/thir.png" style="height: 70px;width: 70px;margin-top: 0px;">Thirukkural Dictionary</h1>

    <div class="search-box">

      <input
        type="number"
        id="num"
        placeholder="Enter Kural Number"
        style="font-style: italic;
        font-weight: bold;
        color:linear-gradient(to right,#f8fafc,#e88625) ;"
      >

      <button onclick="getKural()">
        FIND
      </button>

    </div>

    <div id="tamil" style="font-style: italic;font-size: 30px;"></div>

    <div id="english" style="font-style: italic;color: orangered; background-color: black;"></div>

  </div>

  <script>

    async function getKural(){

      const number =
        document.getElementById("num").value;

      try{

        const response = await fetch(
          "https://raw.githubusercontent.com/tk120404/thirukkural/master/thirukkural.json"
        );

        const allKurals =
          await response.json();

        const data =
          allKurals.kural[number - 1];

        if(data){

          document.getElementById("tamil").innerHTML =
            data.Line1 + "<br>" + data.Line2;

          document.getElementById("english").innerHTML =
            data.Translation;

        }

        else{

          document.getElementById("tamil").innerHTML =
            "Kural not found";

          document.getElementById("english").innerHTML =
            "";

        }

      }

      catch(error){

        console.log(error);

      }

    }

  </script>

</body>

</html>
