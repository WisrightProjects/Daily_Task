<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iphone Style Calculator</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:white;
    }

    .calculator{
      width:320px;
      background:#000;
      padding:20px;
      border-radius:30px;
      box-shadow:0 0 20px rgba(255,255,255,0.1);
    }

    .display{
      width:100%;
      height:100px;
      border:none;
      background:#000;
      color:white;
      font-size:50px;
      text-align:right;
      padding:20px 10px;
      outline:none;
    }

    .buttons{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
    }

    button{
      height:65px;
      border:none;
      border-radius:50%;
      font-size:24px;
      cursor:pointer;
      transition:0.2s;
    }

    button:active{
      transform:scale(0.95);
    }

    .gray{
      background:#a5a5a5;
      color:black;
    }

    .dark{
      background:#333;
      color:white;
    }

    .orange{
      background:#ff9f0a;
      color:white;
    }

    .zero{
      grid-column:span 2;
      border-radius:40px;
      text-align:left;
      padding-left:28px;
    }
  </style>
</head>

<body>
  

  <div class="calculator">
    
    <input type="text" class="display" id="display" value="0" readonly>

    <div class="buttons">
      <button class="gray" onclick="clearDisplay()">AC</button>
      <button class="gray" onclick="appendValue('%')">%</button>
      <button class="gray" onclick="appendValue('/')">÷</button>
      <button class="orange" onclick="appendValue('*')">×</button>

      <button class="dark" onclick="appendValue('7')">7</button>
      <button class="dark" onclick="appendValue('8')">8</button>
      <button class="dark" onclick="appendValue('9')">9</button>
      <button class="orange" onclick="appendValue('-')">−</button>

      <button class="dark" onclick="appendValue('4')">4</button>
      <button class="dark" onclick="appendValue('5')">5</button>
      <button class="dark" onclick="appendValue('6')">6</button>
      <button class="orange" onclick="appendValue('+')">+</button>

      <button class="dark" onclick="appendValue('1')">1</button>
      <button class="dark" onclick="appendValue('2')">2</button>
      <button class="dark" onclick="appendValue('3')">3</button>
      <button class="orange" onclick="calculate()">=</button>

      <button class="dark zero" onclick="appendValue('0')">0</button>
      <button class="dark" onclick="appendValue('.')">.</button>
    </div>
  </div>

  <script>
    let display = document.getElementById("display");

    function appendValue(value) {
      if (display.value === "0") {
        display.value = value;
      } else {
        display.value += value;
      }
    }

    function clearDisplay() {
      display.value = "0";
    }

    function calculate() {
      try {
        display.value = eval(display.value);
      } catch {
        display.value = "Error";
      }
    }
  </script>

</body>
</html>
