<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parking Lot Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>🚗 Parking Lot Management System</h1>

        <div class="card">

            <h2>Park Vehicle</h2>

            <input
                type="text"
                id="vehicleNumber"
                placeholder="Enter Vehicle Number"
            >

            <select id="vehicleType">
                <option value="Car">Car</option>
                <option value="Bike">Bike</option>
                <option value="Truck">Truck</option>
            </select>

            <button onclick="parkVehicle()">
                Park Vehicle
            </button>

        </div>

        <div class="card">

            <h2>Exit Vehicle</h2>

            <input
                type="text"
                id="ticketId"
                placeholder="Enter Ticket ID"
            >

            <button onclick="exitVehicle()">
                Exit Vehicle
            </button>

        </div>

        <div class="card">

            <h2>Available Parking Spots</h2>

            <button onclick="showSpots()">
                Show Spots
            </button>

            <div id="spots"></div>

        </div>

        <div class="card">

            <h2>System Output</h2>

            <div id="output"></div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
