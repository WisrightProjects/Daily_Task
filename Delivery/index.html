<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Delivery System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1 style="font-family:Verdana, Geneva, Tahoma, sans-serif;font-weight: bold;font-style: italic;">🍔 Grab Your sPeCiAL</h1>

        <div class="restaurant-section">
            <h2  style="font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;font-weight: bold;font-style: italic;margin-bottom: 10px;">Restaurants</h2>

            <div id="restaurantList" class="restaurant-list"></div>
        </div>

        <div class="cart-section">
            <h2 style="color: black; text-decoration: underline;">🛒 Cart</h2>

            <ul id="cartItems"></ul>

            <h3 style="margin-top: 10px;color: black;">Total: <span id="totalPrice">₹0</span></h3>

            <input
                type="text"
                id="couponCode"
                placeholder="Enter Coupon Code"
            >

            <button onclick="applyCoupon()" style="margin-top: 10px;">
                Apply Coupon
            </button>

            <div class="payment-section">
                <h3  style="color: black;margin-top:10px;">Payment Method</h3>

                <select id="paymentMethod">
                    <option value="upi">UPI</option>
                    <option value="credit">Credit Card</option>
                    <option value="cod">Cash On Delivery</option>
                </select>
            </div>

            <button class="place-order-btn" onclick="placeOrder()">
                Place Order
            </button>
        </div>

        <div class="order-section">
            <h2 style="color: black;">📦 Order Updates</h2>

            <div id="orderOutput"></div>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
